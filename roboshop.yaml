- name: roboshop instances management
  hosts: local
  connection: local
  vars:
    instances: ["mongodb", "redis", "mysql", "rabbitmq", "catalogue", "user", "cart", "shipping", "payment", "frontend"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: daws90s.shop # replace with your domain
    action: create
  tasks:
  - name: create ec2 instances and update r53 records
    when: action == "create"
    block:
      - name: create ec2
        amazon.aws.ec2_instance:
          instance_type: t3.micro
          name: "roboshop-{{ item }}"
          image_id: "{{ image_id }}"
          security_groups:
          - "roboshop-{{ item }}"
          - roboshop-common
        loop: "{{ instances }}"
        register: ec2_output

      - name: create r53 records
        amazon.aws.route53:
          state: present
          zone: "{{ domain_name }}"
          record: "{{ item.item }}.{{ domain_name }}" #mongodb.daws90s.shop
          type: A
          ttl: 1
          value: "{{ item.instances[0].private_ip_address }}"
          overwrite: true
        loop: "{{ ec2_output.results }}"
        
      - name: create r53 record for frontend
        amazon.aws.route53:
          state: present
          zone: "{{ domain_name }}"
          record: "{{ domain_name }}" #daws90s.shop
          type: A
          ttl: 1
          value: "{{ item.instances[0].public_ip_address }}"
          overwrite: true
        loop: "{{ ec2_output.results }}"
        when: item.item == "frontend"

  - name: delete r53 records and ec2 instances
    when: action == "delete"
    block:
    - name: delete r53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item }}.{{ domain_name }}" # mongodb.daws90s.shop
        ttl: 1
        type: A
      loop: "{{ instances  }}"

    - name: delete r53 record for frontend
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}" # daws90s.shop
        ttl: 1
        type: A
      loop: "{{ instances  }}"  
      when: item == "frontend"
    
    - name: delete ec2 instances
      amazon.aws.ec2_instance:
        state: absent
        name: "roboshop-{{ item }}"
        wait: false
      loop: "{{ instances  }}"